# Prod values overlay for firepit.catalystsquad.com (PLANDOC.md §1's first
# deployment target). Layered on top of helm_chart/values.yaml by
# .reactorcide/jobs/deploy.yaml -> scripts/deploy.sh
# (`helm upgrade --install -f deploy/values-catalystsquad.yaml -f <runtime-overrides>`).
#
# image.*.tag, linkkeys.pki.apiKey, and linkkeysRp.domainKeyPassphrase are
# deliberately NOT set here — deploy.sh injects those at deploy time (the
# image tag from the release that triggered this deploy; the two secrets
# from reactorcide's `${secret:catalystsquad/firepit:...}` vault) so
# nothing sensitive or commit-specific lives in this file. See
# helm_chart/README.md for the full first-deploy runbook this values file
# is one half of.

imagePullSecrets:
  - name: regcred

database:
  # Provisioned per helm_chart/README.md's runbook: a Zalando postgres CR
  # named "firepit-postgres" in the "firepit" namespace, whose credentials
  # get assembled into this single-key Secret.
  existingSecretName: "firepit-db-uri"
  existingSecretKey: "DB_URI"

api:
  corsOrigins: "https://firepit.catalystsquad.com"
  appCallbackUrl: "https://firepit.catalystsquad.com/auth/callback"

linkkeys:
  domain: "catalystsquad.com"
  # The catalystsquad.com linkkeys instance (namespace
  # linkkeys-catalystsquad) is both the IDP and this app's RP — the same
  # arrangement longhouse-catalystsquad uses. It already holds the
  # DNS-published catalystsquad.com domain key, so firepit must NOT boot
  # its own RP claiming that domain identity (linkkeysRp.enabled: false
  # below); it talks to the existing instance over CSIL-RPC/TCP with
  # pinned SPKI fingerprints, mirroring longhouse's config verbatim.
  idpDomain: "catalystsquad.com"
  idpUrl: "https://linkkeys.catalystsquad.com"
  transport: "tcp"
  tcpAddr: "linkkeys-catalystsquad.linkkeys-catalystsquad.svc.cluster.local:4987"
  tcpFingerprints: "c20dadc7bea8ecf47c2d2f43ff78004c5bad28d5f56874c142ddd76c888aaf06,50d7df1ea0298a90d38ed5d7c366172944d7bbed56d9fbd3e9a6e23e39ed7360,63a01719e9df06d7f33b206d301382c610703fc72dd0b54ed11e15faea3c3b80"
  pki:
    url: "http://linkkeys.catalystsquad.com"

linkkeysRp:
  # Using the existing linkkeys-catalystsquad instance as the RP — no
  # in-chart RP Deployment (and the catalystsquad/firepit
  # linkkeys_rp_domain_key_passphrase vault entry goes unused).
  enabled: false

webapp:
  port: 8080

gateway:
  enabled: true
  # Same foundry contour Gateway longhouse's catalystsquad deployment uses
  # (longhouse/deploy/values-catalystsquad.yaml) — one shared Gateway,
  # every app chart in the cluster attaches its own HTTPRoutes to it.
  gatewayName: contour
  gatewayNamespace: projectcontour
  # TLS terminates externally (Cloudflare) in front of this cluster's
  # contour listener for *.catalystsquad.com, same as longhouse's
  # catalystsquad deployment — so this attaches to the plain HTTP listener,
  # not "https". Adjust if firepit's Gateway listener setup differs.
  sectionName: http
  domains:
    - firepit.catalystsquad.com
