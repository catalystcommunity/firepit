{{- /*
Same lookup-preserve pattern as secret-api.yaml: a generated
domainKeyPassphrase survives `helm upgrade` instead of rotating (which
would orphan any domain key material already encrypted under the old
value — see values.yaml's linkkeysRp.domainKeyPassphrase doc comment).
`lookup` returns nil under `helm template` (no cluster), which is fine —
that path only needs valid-looking output, not a stable value.
*/ -}}
{{- if .Values.linkkeysRp.enabled }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-linkkeys-rp" (include "firepit.fullname" .)) -}}
{{- $existingData := dict -}}
{{- if and $existing $existing.data -}}
  {{- $existingData = $existing.data -}}
{{- end -}}
{{- $domainKeyPassphrase := .Values.linkkeysRp.domainKeyPassphrase -}}
{{- if not $domainKeyPassphrase -}}
  {{- if $existingData.DOMAIN_KEY_PASSPHRASE -}}
    {{- $domainKeyPassphrase = $existingData.DOMAIN_KEY_PASSPHRASE | b64dec -}}
  {{- else -}}
    {{- $domainKeyPassphrase = randAlphaNum 64 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "firepit.fullname" . }}-linkkeys-rp
  labels:
    {{- include "firepit.labels" . | nindent 4 }}
    app.kubernetes.io/component: linkkeys-rp
type: Opaque
stringData:
  DOMAIN_KEY_PASSPHRASE: {{ $domainKeyPassphrase | quote }}
{{- end }}
