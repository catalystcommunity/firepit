{{- /*
Look up the existing Secret so an upgrade preserves a generated
sessionNonceSecret across releases (see values.yaml's api.sessionNonceSecret
doc comment). `lookup` returns nil during `helm template`/`helm install
--dry-run` (no cluster), so a default-empty string is fine on that path —
it just means every `helm template` run mints a fresh value, which is
expected and harmless for rendering-only validation.
*/ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-api" (include "firepit.fullname" .)) -}}
{{- $existingData := dict -}}
{{- if and $existing $existing.data -}}
  {{- $existingData = $existing.data -}}
{{- end -}}
{{- $sessionNonceSecret := .Values.api.sessionNonceSecret -}}
{{- if not $sessionNonceSecret -}}
  {{- if $existingData.FIREPIT_SESSION_NONCE_SECRET -}}
    {{- $sessionNonceSecret = $existingData.FIREPIT_SESSION_NONCE_SECRET | b64dec -}}
  {{- else -}}
    {{- $sessionNonceSecret = randAlphaNum 64 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "firepit.fullname" . }}-api
  labels:
    {{- include "firepit.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  FIREPIT_SESSION_NONCE_SECRET: {{ $sessionNonceSecret | quote }}
  {{- if .Values.linkkeys.pki.apiKey }}
  FIREPIT_LINKKEYS_PKI_API_KEY: {{ .Values.linkkeys.pki.apiKey | quote }}
  {{- end }}
