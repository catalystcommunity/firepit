name: firepit-test-web
description: "Typecheck and test the SolidJS webapp via tools.sh"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  # csil/** and clients/** included because the SPA will consume the
  # generated TS client (once task A2 lands) via a path alias, same as
  # longhouse's webapp-test.yaml convention.
  include: ["webapp/**", "clients/**", "csil/**", "tools.sh"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    sh "${REACTORCIDE_JOB_DIR:-${REACTORCIDE_CODE_DIR:-/job/src}}/.reactorcide/jobs/scripts/test-web.sh"
  timeout: 900
  priority: 10
  working_dir: /job/src
  raw_command: true
  run_as:
    user: runner
run_local:
  user: host
