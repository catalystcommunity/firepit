name: firepit-test-go
description: "Build and test the api and coredb Go modules via tools.sh"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  # tools.sh's `test`/`lint` verbs currently run both Go and npm checks in
  # one pass (no per-module split yet), so this job installs both
  # toolchains. Path-scoped so it still only triggers on relevant changes.
  include: ["api/**", "coredb/**", "webapp/**", "tools.sh"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    set -e
    export HOME="${HOME:-/tmp/home}"
    mkdir -p "$HOME/.local"

    echo "=== Installing Go toolchain ==="
    curl -fsSL https://go.dev/dl/go1.26.4.linux-amd64.tar.gz -o /tmp/go.tar.gz
    tar -C "$HOME/.local" -xzf /tmp/go.tar.gz
    rm /tmp/go.tar.gz
    export PATH="$HOME/.local/go/bin:$HOME/go/bin:$PATH"

    echo "=== Installing Node toolchain ==="
    NODE_VERSION="26.1.0"
    curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz
    tar -xJf /tmp/node.tar.xz -C "$HOME/.local"
    mv "$HOME/.local/node-v${NODE_VERSION}-linux-x64" "$HOME/.local/node"
    rm /tmp/node.tar.xz
    export PATH="$HOME/.local/node/bin:$PATH"

    cd /job/src
    ( cd webapp && npm ci )

    echo "=== ./tools.sh lint ==="
    ./tools.sh lint

    echo "=== ./tools.sh test ==="
    ./tools.sh test

    echo "=== ./tools.sh test-integration ==="
    # Requires the `docker` capability below: testcontainers-go (api's
    # store/csilservices/github/server integration suites, plus task D2's
    # api/e2e end-to-end suite) talks to the Docker Engine API directly
    # through its own Go client library, keyed off $DOCKER_HOST — it never
    # shells out to a `docker` CLI binary, so unlike
    # longhouse's api-build-test.sh (which runs a literal `docker build` and
    # therefore needs the CLI installed + a readiness-wait loop) there's
    # nothing to install here. reactorcide's `docker` capability provides a
    # ready DOCKER_HOST before this job's command even starts running (a
    # DinD sidecar on Kubernetes workers, gated by a startup probe; the host
    # docker socket on VM/local workers) — see
    # reactorcide/docs/runtime-behavior.md's "Capabilities" section.
    ./tools.sh test-integration
  timeout: 1800
  priority: 10
  working_dir: /job
  raw_command: true
  capabilities:
    - docker
