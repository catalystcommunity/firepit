name: firepit-test-go
description: "Vet and test the api and coredb Go modules via tools.sh"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include: ["api/**", "coredb/**", "csil/**", "clients/go/**", "tools.sh"]
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    sh "${REACTORCIDE_JOB_DIR:-${REACTORCIDE_CODE_DIR:-/job/src}}/.reactorcide/jobs/scripts/test-go.sh"
  timeout: 1800
  priority: 10
  working_dir: /job/src
  raw_command: true
  capabilities:
    - docker
  run_as:
    user: root
run_local:
  user: root
