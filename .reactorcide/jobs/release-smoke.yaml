name: firepit-release-smoke
description: "PR smoke test for release/deploy scripts and Helm rendering"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include:
    - ".reactorcide/jobs/**"
    - "api/Dockerfile"
    - "webapp/Dockerfile"
    - "helm_chart/**"
    - "deploy/**"
    - "version/**"
job:
  image: containers.catalystsquad.com/public/reactorcide/runnerbase:dev
  command: |
    sh "${REACTORCIDE_JOB_DIR:-${REACTORCIDE_CODE_DIR:-/job/src}}/.reactorcide/jobs/scripts/release-smoke.sh"
  timeout: 600
  priority: 10
  working_dir: /job
  run_as:
    user: runner
run_local:
  user: host
