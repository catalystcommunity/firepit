# Firepit webapp — nginx server block (task D1, PLANDOC.md §3/§6).
#
# This file is a *template*, not the full nginx.conf: webapp/Dockerfile
# copies it to /etc/nginx/templates/default.conf.template in the
# nginxinc/nginx-unprivileged image, whose stock docker-entrypoint.d
# scripts render it through `envsubst` (substituting only real environment
# variables, so nginx's own `$request_uri`/`$host`/etc. built-ins are left
# alone) into /etc/nginx/conf.d/default.conf at container start. That's how
# the FIREPIT_API_URL env var below becomes a real upstream at runtime
# without a custom entrypoint script. NGINX_LOCAL_RESOLVERS is set the
# same way, by the base image's own 15-local-resolvers.envsh (enabled via
# NGINX_ENTRYPOINT_LOCAL_RESOLVERS=1 in webapp/Dockerfile), which reads
# /etc/nginx/resolv.conf's nameservers — i.e. the in-cluster DNS.
#
# NOTE: envsubst substitutes any dollar-brace-wrapped token that's a real
# env var name, anywhere in this file — including comments. Refer to env
# vars by bare name in prose (as above), not the dollar-brace form, or a
# comment mentioning one will silently turn into its runtime value in the
# rendered config.
#
# Routing: the SPA is a client-side router (@solidjs/router, see
# webapp/src/App.tsx) so any path that isn't a real static asset must fall
# through to /index.html. The four backend-owned paths (CSIL-RPC, the
# linkkeys auth callback, the GitHub webhook receiver, and the health
# check — see api/internal/server/server.go) are proxied straight to
# firepit-api instead. In the real deployment the Gateway HTTPRoutes
# (helm_chart/templates/httproute-api.yaml) already split these paths
# before traffic reaches either Service, so this block is belt-and-suspenders
# — it's what makes docker-compose (webapp + api on one Docker network, no
# Gateway) and any non-path-aware Gateway work too.
server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # `proxy_pass` to a bare (non-variable) upstream resolves the hostname
    # ONCE at config load and refuses to start nginx at all if it doesn't
    # resolve yet (e.g. the api Service not up yet, or in a compose
    # dependency race) — see webapp/README-ish comment history / this
    # file's git log for the smoke-test that caught it. Routing the target
    # through an nginx variable instead defers resolution to request time
    # via this `resolver`, so the container starts either way and only
    # individual requests 502 until the upstream resolves.
    resolver ${NGINX_LOCAL_RESOLVERS} valid=10s;
    set $api_upstream ${FIREPIT_API_URL};

    # k8s/compose health probe for the webapp container itself (nginx being
    # alive), distinct from the api's own /healthz proxied below — kept
    # separate so a check of the *webapp* pod doesn't depend on the api
    # being reachable.
    location = /nginx-healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Vite emits hashed filenames under /assets/ — cache them hard; index.html
    # is intentionally left uncached (see the fallback location) so a new
    # deploy is picked up on next load without a forced refresh.
    location /assets/ {
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    location /csil/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhooks/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    # SPA fallback: serve the file if it exists (favicon.svg, etc.),
    # otherwise hand off to index.html for @solidjs/router.
    location / {
        try_files $uri /index.html;
    }
}
